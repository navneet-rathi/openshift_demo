---
- name: List and Shutdown All VMs in OpenShift
  hosts: localhost
  connection: local
  tasks:
    # 1. Gather information about all Virtual Machines
    - name: Get a list of all VirtualMachines from any namespace
      kubevirt.core.kubevirt_vm_info:
      register: vm_list

    # 2. Display the names of the VMs being shut down
    - name: List found VMs
      debug:
        msg: "Found VM: {{ item.metadata.name }} in namespace {{ item.metadata.namespace }}"
      loop: "{{ vm_list.resources }}"

    # 3. Shutdown each VM found in the list
    - name: Shut down all discovered VMs
      kubevirt.core.kubevirt_vm:
        name: "{{ item.metadata.name }}"
        namespace: "{{ item.metadata.namespace }}"
        state: present
        running: yes
        wait: yes  # Wait for the VM to fully stop before finishing the task
      loop: "{{ vm_list.resources }}"
      when: vm_list.resources | length > 0